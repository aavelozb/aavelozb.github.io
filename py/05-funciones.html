---
Para definir una función utilizamos la palabra reservada .red2[`def`:]

```python 
def nombre_funcion(parametro1, parametro2, ...):
    # Cuerpo de la función
    return
```

--

Los parámetros/argumentos tienen nombres que elegimos al definir la función. 

Los parámetros son .red2[variables] que asumen los .red2[valores] dados a la función cuando es .red2[llamada.] 

Una instrucción especial es .red2[`return`]. Tiene dos propósitos:

- Termina la ejecución de la función, volviendo al punto donde fue llamada.
- Especifica el resultado que será entregado al punto de llamado.

### Retorna el MCD de a y b mediante el algoritmo de Euclides

Determinar el(los) error(es)

```python 
def euclides(a, b):
   a = input('a: ')
   b = input('b: ')
   while b != 0:
      resto = a%b
      a = b
      b = resto
   print(a)
```

```python 
def promedio_alumno(s):    
    s += ',' 
    nota = ''
    cont = 0
    suma_notas = 0
    for c in s:
        if c == ',':
            cont += 1
            if cont>1:
                suma_notas += int(nota)
            nota = ''
        else:
            nota+=c            
    return round(suma_notas / (cont-1))
```

--
```python 
def imprimir_promedios(alumnos):
    persona = ''
    alumnos += ';'
    suma_promedios = 0
    contador_alumnos = 0
    for c in alumnos:
        if c == ';':
            suma_promedios += promedio_alumno(persona)
            contador_alumnos += 1
            persona = ''
        else:
            persona += c
    promedio_curso = round(suma_promedios / contador_alumnos)
    print('El promedio del curso es:', promedio_curso)
```

### Ejemplo 1

Hacer un programa usando funciones que calcule el valor del coeficiente binomial.

$$
\left(\begin{array}{l}
n \\\\
k
\end{array}\right)=\frac{n !}{k !(n-k) !}
$$

---
### Solución

(Hacer ruteo)

```python
def factorial(n):
   f = 1
   i = 2
   while i<=n:
      f *= i
      i += 1
   return f

def coeficiente_binomial(n, k):
   a = factorial(n)
   b = factorial(k)
   c = factorial(n-k)
   return a/(b*c)

coef = coeficiente_binomial(3, 2)
print(coef)
```

### Ejemplo 2

Escriba una función que determine el número de dígitos que tiene un número entero.

--
```python 
def num_digitos(n):
    nd = 0
    while n>0:
        n //= 10
        nd += 1
    return nd
```
